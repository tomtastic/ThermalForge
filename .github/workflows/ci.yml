name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  package-smoke:
    runs-on: macos-15
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Package smoke
        run: ./Scripts/ci-smoke.sh
